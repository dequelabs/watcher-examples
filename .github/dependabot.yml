version: 2

updates:
  - package-ecosystem: 'github-actions'
    rebase-strategy: disabled
    directories:
      - '/'
      - '.github/actions/**/*'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '06:37'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
    groups:
      gha-low-risk:
        update-types:
          - 'minor'
          - 'patch'
    cooldown:
      default-days: 7

  - package-ecosystem: 'npm'
    rebase-strategy: disabled
    versioning-strategy: 'increase-if-necessary'
    directories:
      - '/'
      - 'js/**/*'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:37'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
    groups:
      npm-low-risk:
        update-types:
          - 'minor'
          - 'patch'
    cooldown:
      default-days: 7
