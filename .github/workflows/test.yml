name: Tests

on: [push]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: pnpm install
      - run: pnpm lint

  smoke-tests:
    name: Smoke Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # We don't want to fail the whole matrix if one job fails
      # Makes it harder to debug what went wrong if it ends early
      fail-fast: false
      matrix:
        include:
          - directory: js/cypress/basic
          - directory: js/cypress/iframes
            additional-steps: cd js/cypress/iframes && node server.js &
          - directory: js/cypress/manual-mode
          - directory: js/cypress/multi-page
          - directory: js/playwright/basic
            playwright: true
          - directory: js/playwright/manual-mode
            playwright: true
          - directory: js/playwright/typescript-multi-page
            playwright: true
          - directory: js/playwright-test/basic
            playwright: true
          - directory: js/playwright-test/multi-page
            playwright: true
          - directory: js/puppeteer/basic
          - directory: js/puppeteer/typescript-multi-page
          - directory: js/wdio-test-runner/typescript/basic
          - directory: js/wdio-test-runner/typescript/manual-mode
          - directory: js/wdio-test-runner/typescript/typescript-multi-page
          - directory: js/wdio-test-runner/cucumber
          - directory: js/wdio/typescript-multi-page
          - directory: js/webdriverjs/basic
          - directory: js/webdriverjs/testing
          - directory: js/webdriverjs/typescript-multi-page
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version || '24' }}
      - run: mkdir -p ./tmp/browsers
      - uses: ./.github/actions/install-chrome
        id: install-chrome
        with:
          working-directory: ./tmp/browsers
          chrome-version: ${{ vars.CHROME_VERSION || 'stable' }}
      - name: Install Playwright
        if: ${{ matrix.playwright }}
        run: npx playwright install
      - name: Additional steps
        if: ${{ matrix.additional-steps }}
        run: ${{ matrix.additional-steps }}
      - name: Run tests
        run: |
          cd ${{ matrix.directory }} &&
          pnpm install &&
          pnpm test
        env:
          API_KEY: ${{ secrets.AXE_DEVHUB_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SERVER_URL: https://axe.dequelabs.com
          CHROME_BIN: ${{ steps.install-chrome.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.install-chrome.outputs.chromedriver-path }}

  java-smoke-tests:
    name: Java Smoke Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # We don't want to fail the whole matrix if one job fails
      # Makes it harder to debug what went wrong if it ends early
      fail-fast: false
      matrix:
        directory:
          - java/playwright/basic
          - java/playwright/manual-mode
          - java/playwright/context-wrapping
          - java/playwright/multi-page
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mkdir -p ./tmp/browsers
      - uses: ./.github/actions/install-chrome
        id: install-chrome
        with:
          working-directory: ./tmp/browsers
          chrome-version: ${{ vars.CHROME_VERSION || 'stable' }}
      - name: Run tests
        run: |
          cd ${{ matrix.directory }} &&
          mvn -B test
        env:
          API_KEY: ${{ secrets.AXE_DEVHUB_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SERVER_URL: https://axe.dequelabs.com
          # Point Playwright Java at the runner's Chrome; the bundled-browser download is skipped
          # since axe Watcher loads its extension into this binary via the `chrome` channel.
          CHROME_BIN: ${{ steps.install-chrome.outputs.chrome-path }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
