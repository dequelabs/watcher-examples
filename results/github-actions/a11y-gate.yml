# axe Watcher accessibility gate for GitHub Actions.
#
# Prerequisites (repository settings):
#   - Secret  AXE_DEVHUB_API_KEY  — your axe Developer Hub API key.
#   - Variable AXE_PROJECT_ID     — the project UUID.
name: Accessibility Gate
on:
  pull_request:

# The gate needs no repository write access; keep permissions minimal.
permissions:
  contents: read

jobs:
  a11y-gate:
    name: axe Watcher gate
    runs-on: ubuntu-latest
    steps:
      # Download the released CLI binary for this runner (ubuntu-latest →
      # linux/amd64) from Agora.
      # TODO: set AGORA_BASE_URL to the published Agora repository base once
      # the publish location is finalized (dequelabs/axe-watcher-results#36).
      - name: Install axe-watcher-results
        env:
          AGORA_BASE_URL: https://agora.dequecloud.com/artifactory/<repository>
          CLI_VERSION: 1.0.0 # the axe-watcher-results release to install
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL \
            "$AGORA_BASE_URL/axe-watcher-results/$CLI_VERSION/linux/amd64/axe-watcher-results" \
            -o "$RUNNER_TEMP/bin/axe-watcher-results"
          chmod +x "$RUNNER_TEMP/bin/axe-watcher-results"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Gate on the accessibility threshold
        env:
          AXE_DEVHUB_API_KEY: ${{ secrets.AXE_DEVHUB_API_KEY }}
          AXE_PROJECT_ID: ${{ vars.AXE_PROJECT_ID }}
          # On pull_request, github.sha is the merge commit — use the PR head
          # SHA, which is the commit axe Watcher actually scanned.
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Capture the exit code so each outcome gets a clear message.
          set +e
          axe-watcher-results sessions get "$AXE_PROJECT_ID" "$COMMIT_SHA" --format=json >result.json
          code=$?
          set -e

          cat result.json

          case "$code" in
            0)  echo "Accessibility gate passed." ;;
            10) echo "Accessibility threshold exceeded — failing the build."; exit 1 ;;
            12) echo "No comparison data for commit ${COMMIT_SHA}."
                echo "Re-run the axe Watcher scan with CI=true, or seed a baseline."
                # Policy choice: fail. To warn instead, replace with: exit 0
                exit 1 ;;
            11) echo "Timed out waiting for the session to finish processing."; exit 1 ;;
            9)  echo "axe Watcher DevHub returned a server error."; exit 1 ;;
            2|3) echo "Configuration error — check AXE_DEVHUB_API_KEY, AXE_PROJECT_ID, and flags."; exit 1 ;;
            *)  echo "axe-watcher-results exited with code ${code}."; exit 1 ;;
          esac

      # Archive the JSON result for the build logs, even when the gate fails.
      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-watcher-result
          path: result.json
          if-no-files-found: warn
