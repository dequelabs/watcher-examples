# axe Watcher accessibility gate for GitLab CI.
#
# Prerequisites (Settings > CI/CD > Variables):
#   - AXE_DEVHUB_API_KEY  — your axe Developer Hub API key. Mark it Masked
#     (and Protected). Never inline it here.
#   - AXE_PROJECT_ID      — the project UUID (a plain variable is fine).
accessibility-gate:
  # A small image with curl is all that is needed to fetch the released binary.
  image: alpine:3
  # TODO: set AGORA_BASE_URL to the published Agora repository base once the
  # publish location is finalized (dequelabs/axe-watcher-results#36).
  variables:
    AGORA_BASE_URL: https://agora.dequecloud.com/artifactory/<repository>
    CLI_VERSION: '1.0.0' # the axe-watcher-results release to install
  script:
    - apk add --no-cache curl
    - curl -fsSL "$AGORA_BASE_URL/axe-watcher-results/$CLI_VERSION/linux/amd64/axe-watcher-results" -o /usr/local/bin/axe-watcher-results
    - chmod +x /usr/local/bin/axe-watcher-results
    - |
      # Capture the exit code so each outcome gets a clear message.
      set +e
      axe-watcher-results sessions get "$AXE_PROJECT_ID" "$CI_COMMIT_SHA" --format=json >result.json
      code=$?
      set -e

      cat result.json

      case "$code" in
        0)  echo "Accessibility gate passed." ;;
        10) echo "Accessibility threshold exceeded — failing the build."; exit 1 ;;
        12) echo "No comparison data for commit ${CI_COMMIT_SHA}."
            echo "Re-run the axe Watcher scan with CI=true, or seed a baseline."
            # Policy choice: fail. To warn instead, replace with: exit 0
            exit 1 ;;
        11) echo "Timed out waiting for the session to finish processing."; exit 1 ;;
        9)  echo "axe Watcher DevHub returned a server error."; exit 1 ;;
        2|3) echo "Configuration error — check AXE_DEVHUB_API_KEY, AXE_PROJECT_ID, and flags."; exit 1 ;;
        *)  echo "axe-watcher-results exited with code ${code}."; exit 1 ;;
      esac
  artifacts:
    when: always
    paths:
      - result.json
